version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"    # REST API
    volumes:
      - qdrant_data:/qdrant/storage
    # environment:
      # QDRANT__SERVICE__API_KEY: your-secret-key-here  # Optional: for securing access
    restart: unless-stopped

volumes:
  qdrant_data: