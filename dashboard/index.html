<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retrieval Dashboard</title>
  <link rel="stylesheet" href="/dashboard/assets/styles.css" />
</head>
<body>
  <main class="layout">
    <section class="hero">
      <p class="eyebrow">Qdrant Retrieval Dashboard</p>
      <h1>Pick a config and inspect retrieval results.</h1>
      <p class="lede">
        Select a saved config, adjust the request payload if needed, and run `/retrieve`
        without building a separate client.
      </p>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Request</h2>
        <span id="status-badge" class="status-badge">Loading strategies</span>
      </div>

      <div class="grid">
        <label class="field">
          <span>Saved config</span>
          <select id="config-select"></select>
        </label>

        <label class="field">
          <span>Parser</span>
          <select id="parser-select"></select>
        </label>

        <label class="field">
          <span>Chunker</span>
          <select id="chunker-select"></select>
        </label>

        <label class="field">
          <span>Embedder</span>
          <select id="embedder-select"></select>
        </label>

        <label class="field">
          <span>Retrieval</span>
          <select id="retrieval-select"></select>
        </label>

        <label class="field">
          <span>Vector DB</span>
          <select id="vector-db-select"></select>
        </label>

        <label class="field">
          <span>Query</span>
          <input id="query-input" type="text" placeholder="What symptoms were discussed?" />
        </label>

        <label class="field">
          <span>Top K</span>
          <input id="top-k-input" type="number" min="1" value="5" />
        </label>

        <label class="field field-wide">
          <span>Filters JSON</span>
          <textarea id="filters-input" rows="6" placeholder='{"metadata.document_id": "doc-1"}'></textarea>
        </label>

        <label class="field field-wide">
          <span>Config JSON</span>
          <textarea id="config-input" rows="14"></textarea>
        </label>
      </div>

      <div class="actions">
        <button id="run-button" type="button">Run Retrieval Test</button>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Available strategies</h2>
      </div>
      <pre id="strategy-output" class="code-block">Loading...</pre>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Results</h2>
      </div>
      <pre id="results-output" class="code-block">Run a query to see results.</pre>
    </section>
  </main>

  <script src="/dashboard/assets/app.js" defer></script>
</body>
</html>
